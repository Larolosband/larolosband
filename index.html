<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La Escuela de la Salsa – Rolos Band</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
  background:#050b12;
  color:white;
}

.hero{
  height:100vh;
  background:
    linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.85)),
    url("https://i.imgur.com/A0HGX0u.png") center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px;
}

.hero h1{
  font-size:4rem;
  color:#ffd36a;
  text-shadow:0 0 30px #ffb700;
}

.hero h2{
  font-size:2rem;
  color:#00ffd5;
  margin-top:15px;
  letter-spacing:2px;
}

.btn{
  display:inline-block;
  margin-top:40px;
  padding:18px 45px;
  background:linear-gradient(45deg,#ffb000,#ff0055);
  border-radius:40px;
  color:black;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 0 30px rgba(255,80,0,.8);
  transition:.3s;
}

.btn:hover{
  transform:scale(1.08);
  box-shadow:0 0 50px rgba(255,100,0,1);
}

section{
  padding:80px 10%;
  background:#050b12;
}

h3{
  color:#ffd36a;
  font-size:2.5rem;
  margin-bottom:30px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
}

.card{
  background:rgba(0,0,0,.6);
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,255,200,.2);
}

.card h4{
  color:#00ffd5;
  margin-bottom:15px;
  font-size:1.5rem;
}

footer{
  background:black;
  text-align:center;
  padding:40px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="hero">
  <div>
    <h1>La Escuela de la Salsa</h1>
    <h2>ROLOS BAND</h2>
    <a href="#clases" class="btn">Ver Clases</a>
  </div>
</div>

<section id="clases">
  <h3>Explora tus Clases</h3>
  <div class="grid">
    <div class="card">
      <h4>Salsa</h4>
      <p>Domina el ritmo que mueve al mundo.</p>
    </div>
    <div class="card">
      <h4>Piano</h4>
      <p>Armonía y sabor latino.</p>
    </div>
    <div class="card">
      <h4>Percusión</h4>
      <p>Congas, bongó y timbal profesional.</p>
    </div>
  </div>
</section>

<footer>
  © Rolos Band – La Escuela de la Salsa
</footer>

</body>
</html>
